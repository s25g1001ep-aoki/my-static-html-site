name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_MEADOW_0C6E40E00 }}
          action: "upload"
          app_location: "/" 
          api_location: "" 
          output_location: "/" 
          skip_app_build: true